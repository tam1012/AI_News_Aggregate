name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Oracle VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /home/ubuntu/newstamhv
          git pull --ff-only origin main
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          docker compose up -d --build
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3001/api/health/live >/dev/null; then
              break
            fi
            if [ "$i" = "20" ]; then
              docker compose logs --tail=120 app
              exit 1
            fi
            sleep 3
          done

          node <<'NODE'
          const base = 'http://127.0.0.1:3001';
          const assert = (condition, message) => {
            if (!condition) throw new Error(message);
          };

          const getJson = async (path) => {
            const res = await fetch(`${base}${path}`);
            assert(res.ok, `${path} HTTP ${res.status}`);
            return res.json();
          };

          const live = await getJson('/api/health/live');
          assert(live.success === true, '/api/health/live success flag missing');

          const dates = await getJson('/api/articles/dates');
          assert(Array.isArray(dates.data), '/api/articles/dates data is not array');
          if (dates.data.length > 0) {
            assert(/^\d{4}-\d{2}-\d{2}$/.test(dates.data[0].date), `/api/articles/dates invalid date: ${dates.data[0].date}`);
          }

          const articles = await getJson('/api/articles?limit=3&status=done');
          assert(Array.isArray(articles.data), '/api/articles data is not array');
          assert(articles.data.length > 0, '/api/articles returned no done articles');
          NODE

          docker compose exec -T app node --input-type=module <<'NODE'
          import puppeteer from 'puppeteer-core';

          const browser = await puppeteer.launch({
            executablePath: process.env.PUPPETEER_EXECUTABLE_PATH || '/usr/bin/chromium-browser',
            args: ['--no-sandbox', '--disable-setuid-sandbox'],
          });
          try {
            const page = await browser.newPage();
            await page.goto('http://127.0.0.1:3000', { waitUntil: 'networkidle2', timeout: 30000 });
            await page.waitForSelector('.feed-item-title', { timeout: 30000 });
          } finally {
            await browser.close();
          }
          NODE

          for i in {1..30}; do
            if curl -fsS https://synthnews.site/api/health/live >/dev/null; then
              break
            fi
            if [ "$i" = "30" ]; then
              echo "public live health smoke failed"
              docker compose ps
              docker compose logs --tail=120 app
              exit 1
            fi
            sleep 5
          done

          for i in {1..12}; do
            if curl -fsS https://synthnews.site/api/articles?limit=3\&status=done | grep -q '"success":true'; then
              break
            fi
            if [ "$i" = "12" ]; then
              echo "public articles smoke failed"
              docker compose ps
              docker compose logs --tail=120 app
              exit 1
            fi
            sleep 5
          done

          docker compose ps

          docker builder prune -af --keep-storage=2GB || true
          docker image prune -af || true
