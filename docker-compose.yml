services:
  scrapling:
    build: ./scrapling-sidecar
    container_name: newstamhv-scrapling
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
      SCRAPLING_TIMEOUT_MS: ${SCRAPLING_TIMEOUT_MS:-60000}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  db:
    image: postgres:16-alpine
    container_name: newstamhv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: newstamhv
      POSTGRES_USER: newstamhv
      POSTGRES_PASSWORD: ${DB_PASSWORD:-newstamhv_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newstamhv"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build: .
    container_name: newstamhv-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      scrapling:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      TZ: Asia/Ho_Chi_Minh
      PORT: 3000
      NODE_ENV: production
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://synthnews.site}
      DATABASE_URL: postgresql://newstamhv:${DB_PASSWORD:-newstamhv_secret}@db:5432/newstamhv
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-1}
      MAX_ARTICLES_PER_SOURCE: ${MAX_ARTICLES_PER_SOURCE:-20}
      MAX_AI_CALLS_PER_RUN: ${MAX_AI_CALLS_PER_RUN:-30}
      DIGEST_ARTICLE_LIMIT: ${DIGEST_ARTICLE_LIMIT:-100}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      VOZ_MAX_THREAD_PAGES: ${VOZ_MAX_THREAD_PAGES:-15}
      FORUM_MAX_COMMENTS: ${FORUM_MAX_COMMENTS:-70}
      FORUM_MIN_COMMENTS: ${FORUM_MIN_COMMENTS:-10}
      FORUM_RAW_CONTENT_MAX_LENGTH: ${FORUM_RAW_CONTENT_MAX_LENGTH:-80000}
      REDDIT_COMMENT_LIMIT: ${REDDIT_COMMENT_LIMIT:-30}
      REDDIT_COMMENT_DEPTH: ${REDDIT_COMMENT_DEPTH:-3}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      REDDIT_USERNAME: ${REDDIT_USERNAME:-}
      REDDIT_PASSWORD: ${REDDIT_PASSWORD:-}
      REDDIT_PROXY_URL: ${REDDIT_PROXY_URL:-}
      BROWSER_PROXY_URL: ${BROWSER_PROXY_URL:-}
      VOZ_PROXY_URL: ${VOZ_PROXY_URL:-}
      WORKER_PROXY_URL: ${WORKER_PROXY_URL:-}
      WORKER_PROXY_TOKEN: ${WORKER_PROXY_TOKEN:-}
      WORKER_PROXY_SKIP_DOMAINS: ${WORKER_PROXY_SKIP_DOMAINS:-voz.vn,vozforums.com}
      ENABLE_SITEMAP_DISCOVERY: ${ENABLE_SITEMAP_DISCOVERY:-true}
      SCRAPLING_SERVICE_URL: ${SCRAPLING_SERVICE_URL:-http://scrapling:8000}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health/live >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
